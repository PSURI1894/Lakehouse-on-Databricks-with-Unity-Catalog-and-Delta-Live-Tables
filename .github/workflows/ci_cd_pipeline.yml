name: Enterprise Lakehouse CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-and-test:
    name: Code Quality & Unit Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python Dependencies
        run: |
          poetry install

      - name: Run Black & Isort Checks
        run: |
          poetry run black --check src tests
          poetry run isort --check src tests

      - name: Run Flake8 Linter
        run: |
          poetry run flake8 src tests --max-line-length=100

      - name: Run Mypy Type Checker
        run: |
          poetry run mypy src tests

      - name: Run Mocked Unit Tests
        run: |
          poetry run pytest tests/ -v

  validate-infrastructure:
    name: Terraform & DABs Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Validate Terraform Layouts
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      - name: Setup Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate Databricks Asset Bundles
        env:
          DATABRICKS_HOST: https://adb-development-east.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_DEV_TOKEN }}
        run: |
          cd dabs
          databricks bundle validate --target development
